input_boolean:
  maxsun_motherboard_rgb_power:
    name: Maxsun Motherboard RGB Power
    icon: mdi:led-strip-variant
  maxsun_motherboard_rgb_available:
    name: Maxsun Motherboard RGB Available
    icon: mdi:connection

input_number:
  maxsun_motherboard_rgb_brightness:
    name: Maxsun Motherboard RGB Brightness
    min: 0
    max: 255
    step: 1
    mode: slider
    icon: mdi:brightness-6

input_text:
  maxsun_motherboard_rgb_color:
    name: Maxsun Motherboard RGB Color
    initial: "255,255,255"
    max: 11

template:
  - light:
      - name: Maxsun Motherboard RGB
        unique_id: maxsun_motherboard_rgb
        availability: "{{ is_state('input_boolean.maxsun_motherboard_rgb_available', 'on') }}"
        state: "{{ is_state('input_boolean.maxsun_motherboard_rgb_power', 'on') }}"
        level: "{{ states('input_number.maxsun_motherboard_rgb_brightness') | int(255) }}"
        rgb: >
          {% set parts = states('input_text.maxsun_motherboard_rgb_color').split(',') %}
          [{{ parts[0] | int(255) }}, {{ parts[1] | int(255) }}, {{ parts[2] | int(255) }}]
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.maxsun_motherboard_rgb_power
          - action: input_number.set_value
            target:
              entity_id: input_number.maxsun_motherboard_rgb_brightness
            data:
              value: "{{ brightness | default(states('input_number.maxsun_motherboard_rgb_brightness') | int(255), true) }}"
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.maxsun_motherboard_rgb_power
        set_level:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.maxsun_motherboard_rgb_power
          - action: input_number.set_value
            target:
              entity_id: input_number.maxsun_motherboard_rgb_brightness
            data:
              value: "{{ brightness }}"
        set_rgb:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.maxsun_motherboard_rgb_power
          - action: input_text.set_value
            target:
              entity_id: input_text.maxsun_motherboard_rgb_color
            data:
              value: "{{ rgb[0] }},{{ rgb[1] }},{{ rgb[2] }}"
          - action: input_number.set_value
            target:
              entity_id: input_number.maxsun_motherboard_rgb_brightness
            data:
              value: "{{ brightness | default(states('input_number.maxsun_motherboard_rgb_brightness') | int(255), true) }}"
